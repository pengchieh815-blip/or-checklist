<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開刀房盤點 — 主管後台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy, where, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ══════════════════════════════════════════════
//  ★ 請填入與盤點 App 相同的 Firebase 設定 ★
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBf7Of7ZQW3o_J3P0CXwiOCeqRsqqe-I4c",
  authDomain:        "or-checklist-9208e.firebaseapp.com",
  projectId:         "or-checklist-9208e",
  storageBucket:     "or-checklist-9208e.firebasestorage.app",
  messagingSenderId: "698322497360",
  appId:             "1:698322497360:web:1c157351862511a5e40655",
  measurementId:     "G-P1TR81XRY9"
};
// ══════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
window._db       = db;
window._fsColl   = collection;
window._fsGetDoc = getDocs;
window._fsQuery  = query;
window._fsOrder  = orderBy;
window._fsWhere  = where;
window._fsReady  = true;
window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
:root{
  --blue:#1e4d8c;--blue-light:#2563eb;--blue-dark:#132f56;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Sidebar layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,var(--blue-dark) 0%,var(--blue) 100%);color:#fff;flex-shrink:0;display:flex;flex-direction:column;padding:0}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand .icon{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.sidebar-brand .name{font-size:14px;font-weight:700}
.sidebar-brand .sub{font-size:11px;opacity:.6;margin-top:2px}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.on{background:rgba(255,255,255,.18);color:#fff}
.nav-item i{font-size:17px}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;opacity:.5}
.db-status{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;opacity:.7}
.db-dot{width:7px;height:7px;border-radius:50%;background:#94a3b8}
.db-dot.ok{background:#4ade80}

/* Main */
.main{flex:1;padding:28px;overflow-y:auto}
.page{display:none}
.page.on{display:block}
.page-title{font-size:22px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:24px}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border-left:4px solid var(--border)}
.stat-card.blue{border-left-color:var(--blue-light)}
.stat-card.green{border-left-color:var(--green)}
.stat-card.amber{border-left-color:var(--amber)}
.stat-card.red{border-left-color:var(--red)}
.stat-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.stat-value{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:4px}

/* Filters */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar select,.filter-bar input{padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--card);color:var(--text)}
.filter-bar input{min-width:160px}
.refresh-btn{padding:9px 16px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:13px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;margin-left:auto}
.export-btn{padding:9px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px}

/* Table */
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-head{display:grid;grid-template-columns:1fr 90px 80px 80px 70px 90px 110px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;gap:8px}
.table-row{display:grid;grid-template-columns:1fr 90px 80px 80px 70px 90px 110px;padding:13px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;gap:8px;align-items:center;transition:background .1s}
.table-row:hover{background:#f8fafc}
.table-row:last-child{border-bottom:none}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 8px;border-radius:99px;font-weight:700}
.pill.ok{background:#dcfce7;color:#166534}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.err{background:#fee2e2;color:#991b1b}
.cell-name{font-weight:600}
.cell-area{color:var(--text2)}
.cell-time{font-size:11px;color:var(--text3)}
.cell-anoms{color:var(--amber);font-size:12px}
.empty-state{padding:60px;text-align:center;color:var(--text3)}
.empty-state i{font-size:48px;display:block;margin-bottom:12px;opacity:.3}

/* Chart */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text2);width:80px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.bar-fill{height:10px;border-radius:99px;background:linear-gradient(90deg,var(--blue-light),var(--blue));transition:width .6s}
.bar-fill.warn{background:linear-gradient(90deg,#fb923c,var(--amber))}
.bar-val{font-size:11px;font-weight:700;color:var(--text2);width:28px;flex-shrink:0}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text3);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}

/* Mobile hint */
@media(max-width:700px){
  .sidebar{display:none}
  .main{padding:16px}
  .chart-grid{grid-template-columns:1fr}
  .table-head,.table-row{grid-template-columns:1fr 80px 60px 60px}
  .table-head .h4,.table-head .h5,.table-head .h6,.table-row .c4,.table-row .c5,.table-row .c6{display:none}
}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="icon">🏥</div>
    <div class="name">主管後台</div>
    <div class="sub">開刀房財產盤點管理</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item on" onclick="showPage('dashboard')"><i class="ti ti-layout-dashboard"></i>總覽</div>
    <div class="nav-item" onclick="showPage('records')"><i class="ti ti-list-details"></i>所有記錄</div>
    <div class="nav-item" onclick="showPage('anomaly')"><i class="ti ti-alert-triangle"></i>異常清單</div>
    <div class="nav-item" onclick="showPage('stats')"><i class="ti ti-chart-bar"></i>統計分析</div>
  </nav>
  <div class="sidebar-footer">
    <div id="last-sync">尚未同步</div>
    <div class="db-status"><div class="db-dot" id="db-dot"></div><span id="db-text">連線中…</span></div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- 總覽 -->
  <div id="pg-dashboard" class="page on">
    <div class="page-title">盤點總覽</div>
    <div class="page-sub" id="dash-date"></div>
    <div class="stat-grid">
      <div class="stat-card blue">
        <div class="stat-label"><i class="ti ti-clipboard-list" style="font-size:14px"></i>總盤點次數</div>
        <div class="stat-value" id="s-total">—</div>
        <div class="stat-sub">所有記錄</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label"><i class="ti ti-circle-check" style="font-size:14px"></i>今日完成</div>
        <div class="stat-value" id="s-today">—</div>
        <div class="stat-sub">今天的盤點次數</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label"><i class="ti ti-alert-triangle" style="font-size:14px"></i>有異常記錄</div>
        <div class="stat-value" id="s-anoms">—</div>
        <div class="stat-sub">需要注意</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label"><i class="ti ti-users" style="font-size:14px"></i>盤點人員數</div>
        <div class="stat-value" id="s-staff">—</div>
        <div class="stat-sub">不同簽名人</div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">各區域盤點次數</div>
        <div id="chart-area"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">各人員盤點次數</div>
        <div id="chart-staff"></div>
      </div>
    </div>
    <div class="chart-card" style="background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)">
      <div class="chart-title">最近 10 筆記錄</div>
      <div id="dash-recent"></div>
    </div>
  </div>

  <!-- 所有記錄 -->
  <div id="pg-records" class="page">
    <div class="page-title">所有盤點記錄</div>
    <div class="page-sub">全部科室的盤點歷史</div>
    <div class="filter-bar">
      <select id="f-area" onchange="renderRecords()"><option value="">所有區域</option></select>
      <select id="f-staff" onchange="renderRecords()"><option value="">所有人員</option></select>
      <select id="f-status" onchange="renderRecords()">
        <option value="">所有狀態</option>
        <option value="ok">正常</option>
        <option value="warn">有異常</option>
      </select>
      <input type="date" id="f-date" onchange="renderRecords()">
      <button class="export-btn" onclick="exportAll()"><i class="ti ti-download"></i>匯出 Excel</button>
      <button class="refresh-btn" onclick="loadData()"><i class="ti ti-refresh"></i>重新整理</button>
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <div>盤點人員</div><div>區域</div><div class="h4">完成</div><div class="h5">異常</div><div class="h6">狀態</div><div>時間</div><div></div>
      </div>
      <div id="records-body"></div>
    </div>
  </div>

  <!-- 異常清單 -->
  <div id="pg-anomaly" class="page">
    <div class="page-title">異常清單</div>
    <div class="page-sub">所有標記異常的盤點項目</div>
    <div class="filter-bar">
      <select id="fa-area" onchange="renderAnomalies()"><option value="">所有區域</option></select>
      <button class="refresh-btn" onclick="loadData()"><i class="ti ti-refresh"></i>重新整理</button>
    </div>
    <div id="anom-list"></div>
  </div>

  <!-- 統計 -->
  <div id="pg-stats" class="page">
    <div class="page-title">統計分析</div>
    <div class="page-sub">盤點完成率與趨勢</div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">各區域完成率</div>
        <div id="stat-completion"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">異常發生次數（區域）</div>
        <div id="stat-anom-area"></div>
      </div>
    </div>
    <div class="chart-card" style="background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px">
      <div class="chart-title">每日盤點次數（最近 14 天）</div>
      <div id="stat-daily"></div>
    </div>
  </div>

</div><!-- /main -->
</div><!-- /layout -->

<script>
let allRecords = [];
let currentPage = 'dashboard';

// ── 頁面切換 ──────────────────────────────────────
function showPage(p){
  currentPage = p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  document.querySelectorAll('.nav-item')[['dashboard','records','anomaly','stats'].indexOf(p)].classList.add('on');
  renderCurrentPage();
}

function renderCurrentPage(){
  if(currentPage==='dashboard') renderDashboard();
  else if(currentPage==='records') renderRecords();
  else if(currentPage==='anomaly') renderAnomalies();
  else if(currentPage==='stats') renderStats();
}

// ── 載入資料 ──────────────────────────────────────
async function loadData(){
  document.getElementById('db-dot').className='db-dot';
  document.getElementById('db-text').textContent='連線中…';

  if(!window._fsReady || !window._db){
    document.getElementById('db-text').textContent='Firebase 未設定';
    return;
  }

  try{
    const col  = window._fsColl(window._db, 'checklist_records');
    const q    = window._fsQuery(col, window._fsOrder('createdAt','desc'));
    const snap = await window._fsGetDoc(q);
    allRecords = [];
    snap.forEach(doc=>{
      const d = doc.data();
      allRecords.push({
        id:       doc.id,
        time:     d.time || '',
        area:     d.area || '',
        by:       d.by || '',
        total:    d.total || 0,
        checked:  d.checked || 0,
        anoms:    d.anoms || 0,
        anomDetails: d.anomDetails || [],
        deviceId: d.deviceId || '',
        createdAt: d.createdAt ? d.createdAt.toDate() : new Date()
      });
    });

    document.getElementById('db-dot').className='db-dot ok';
    document.getElementById('db-text').textContent='已連線';
    document.getElementById('last-sync').textContent='同步：'+nowStr();

    populateFilters();
    renderCurrentPage();
  }catch(e){
    document.getElementById('db-dot').className='db-dot err';
    document.getElementById('db-text').textContent='連線失敗';
    console.error(e);
  }
}

function nowStr(){const n=new Date();return(n.getMonth()+1)+'/'+n.getDate()+' '+n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');}
function todayStr(){const n=new Date();return n.getFullYear()+'/'+(n.getMonth()+1)+'/'+n.getDate();}

function populateFilters(){
  const areas  = [...new Set(allRecords.map(r=>r.area))].sort();
  const staffs = [...new Set(allRecords.map(r=>r.by))].sort();

  ['f-area','fa-area'].forEach(id=>{
    const sel=document.getElementById(id); if(!sel)return;
    const cur=sel.value;
    sel.innerHTML='<option value="">所有區域</option>';
    areas.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sel.appendChild(o);});
    sel.value=cur;
  });

  const fs=document.getElementById('f-staff');
  if(fs){const cur=fs.value;fs.innerHTML='<option value="">所有人員</option>';staffs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fs.appendChild(o);});fs.value=cur;}
}

// ── 總覽 ──────────────────────────────────────────
function renderDashboard(){
  const today = todayStr();
  document.getElementById('dash-date').textContent = today + ' · 共 '+allRecords.length+' 筆記錄';
  document.getElementById('s-total').textContent  = allRecords.length;
  document.getElementById('s-today').textContent  = allRecords.filter(r=>r.time.startsWith(today)).length;
  document.getElementById('s-anoms').textContent  = allRecords.filter(r=>r.anoms>0).length;
  document.getElementById('s-staff').textContent  = new Set(allRecords.map(r=>r.by)).size;

  // 區域長條圖
  const areaCnt={};
  allRecords.forEach(r=>{areaCnt[r.area]=(areaCnt[r.area]||0)+1;});
  renderBarChart('chart-area', areaCnt, 6);

  // 人員長條圖
  const staffCnt={};
  allRecords.forEach(r=>{staffCnt[r.by]=(staffCnt[r.by]||0)+1;});
  renderBarChart('chart-staff', staffCnt, 6);

  // 最近 10 筆
  const recent = allRecords.slice(0,10);
  document.getElementById('dash-recent').innerHTML = recent.length
    ? recent.map(r=>`
      <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9;gap:12px">
        <span class="pill ${r.anoms?'warn':'ok'}">${r.anoms?'有異常':'正常'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${r.area}</div>
          <div style="font-size:11px;color:var(--text3)">${r.by} · ${r.time}</div>
        </div>
        <div style="font-size:12px;color:var(--text3)">${r.checked}/${r.total}</div>
      </div>`).join('')
    : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">尚無資料</div>';
}

function renderBarChart(containerId, dataObj, maxItems){
  const el = document.getElementById(containerId);
  const entries = Object.entries(dataObj).sort((a,b)=>b[1]-a[1]).slice(0,maxItems);
  const max = entries[0]?.[1] || 1;
  el.innerHTML = entries.length
    ? entries.map(([k,v])=>`
      <div class="bar-row">
        <div class="bar-label" title="${k}">${k}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div>
        <div class="bar-val">${v}</div>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:13px;padding:8px 0">尚無資料</div>';
}

// ── 記錄列表 ──────────────────────────────────────
function renderRecords(){
  const area   = document.getElementById('f-area')?.value || '';
  const staff  = document.getElementById('f-staff')?.value || '';
  const status = document.getElementById('f-status')?.value || '';
  const date   = document.getElementById('f-date')?.value || '';

  let rows = allRecords.filter(r=>{
    if(area   && r.area!==area) return false;
    if(staff  && r.by!==staff)  return false;
    if(status==='ok'   && r.anoms>0) return false;
    if(status==='warn' && r.anoms===0) return false;
    if(date){
      const d=new Date(date);
      const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
      if(!r.time.startsWith(ds)) return false;
    }
    return true;
  });

  const body = document.getElementById('records-body');
  if(!rows.length){
    body.innerHTML='<div class="empty-state"><i class="ti ti-database-off"></i>找不到符合的記錄</div>';
    return;
  }
  body.innerHTML = rows.map(r=>`
    <div class="table-row">
      <div class="cell-name"><i class="ti ti-user" style="font-size:12px;margin-right:4px;color:var(--text3)"></i>${r.by}</div>
      <div class="cell-area">${r.area}</div>
      <div class="c4" style="font-size:12px;color:var(--text2)">${r.checked}/${r.total}</div>
      <div class="c5 cell-anoms">${r.anoms?'⚠ '+r.anoms:'—'}</div>
      <div class="c6"><span class="pill ${r.anoms?'warn':'ok'}">${r.anoms?'有異常':'正常'}</span></div>
      <div class="cell-time">${r.time}</div>
      <div>${r.anomDetails.length?`<span style="font-size:11px;color:var(--amber)">${r.anomDetails.join('、')}</span>`:'—'}</div>
    </div>`).join('');
}

// ── 異常清單 ──────────────────────────────────────
function renderAnomalies(){
  const area = document.getElementById('fa-area')?.value || '';
  const anomRecords = allRecords.filter(r=>r.anoms>0 && (!area||r.area===area));
  const el = document.getElementById('anom-list');

  if(!anomRecords.length){
    el.innerHTML='<div class="empty-state"><i class="ti ti-circle-check"></i>目前沒有異常記錄 🎉</div>';
    return;
  }

  el.innerHTML = anomRecords.map(r=>`
    <div style="background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--amber)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <span style="font-size:14px;font-weight:700">${r.area}</span>
          <span style="font-size:12px;color:var(--text3);margin-left:8px">${r.time}</span>
        </div>
        <span style="font-size:12px;font-weight:600;color:var(--text2)">點班人：${r.by}</span>
      </div>
      ${r.anomDetails.map(d=>`
        <div style="display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:#fffbeb;border-radius:8px;margin-bottom:6px;font-size:13px;border:1px solid #fde68a">
          <i class="ti ti-alert-triangle" style="color:var(--amber);font-size:14px;margin-top:1px;flex-shrink:0"></i>
          <span>${d}</span>
        </div>`).join('')}
    </div>`).join('');
}

// ── 統計分析 ──────────────────────────────────────
function renderStats(){
  // 各區域完成率
  const areaStats={};
  allRecords.forEach(r=>{
    if(!areaStats[r.area])areaStats[r.area]={checked:0,total:0};
    areaStats[r.area].checked+=r.checked;
    areaStats[r.area].total+=r.total;
  });
  const completionEl=document.getElementById('stat-completion');
  const compEntries=Object.entries(areaStats).sort((a,b)=>(b[1].checked/b[1].total||0)-(a[1].checked/a[1].total||0));
  completionEl.innerHTML=compEntries.length?compEntries.map(([k,v])=>{
    const pct=v.total?Math.round(v.checked/v.total*100):0;
    return`<div class="bar-row">
      <div class="bar-label" title="${k}">${k}</div>
      <div class="bar-track"><div class="bar-fill${pct<80?' warn':''}" style="width:${pct}%"></div></div>
      <div class="bar-val">${pct}%</div>
    </div>`;
  }).join(''):'<div style="color:var(--text3);font-size:13px">尚無資料</div>';

  // 異常次數（區域）
  const anomArea={};
  allRecords.forEach(r=>{if(r.anoms>0)anomArea[r.area]=(anomArea[r.area]||0)+r.anoms;});
  renderBarChart('stat-anom-area', anomArea, 8);

  // 每日盤點次數（14 天）
  const daily={};
  const today=new Date();
  for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const k=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();daily[k]=0;}
  allRecords.forEach(r=>{const day=r.time.slice(0,r.time.indexOf(' '));if(daily[day]!==undefined)daily[day]++;});
  renderBarChart('stat-daily', daily, 14);
}

// ── 匯出 Excel ────────────────────────────────────
function exportAll(){
  if(!allRecords.length){alert('沒有資料可匯出');return;}
  const wb=XLSX.utils.book_new();
  const header=['時間','區域','盤點人員','總項目','已盤點','未盤點','異常數','異常明細'];
  const rows=allRecords.map(r=>[r.time,r.area,r.by,r.total,r.checked,r.total-r.checked,r.anoms,r.anomDetails.join('；')]);
  const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
  ws['!cols']=[{wch:18},{wch:16},{wch:10},{wch:8},{wch:8},{wch:8},{wch:8},{wch:50}];
  XLSX.utils.book_append_sheet(wb,ws,'所有記錄');
  XLSX.writeFile(wb,'盤點總表_'+nowStr().replace(/[/:]/g,'-')+'.xlsx');
}

// ── 初始化 ────────────────────────────────────────
const _n=new Date();
document.getElementById('dash-date').textContent=(_n.getFullYear()-1911)+'年'+(_n.getMonth()+1)+'月'+_n.getDate()+'日';

window.addEventListener('firebase-ready',()=>{
  loadData();
});
// 若 firebase 已就緒就直接載入
setTimeout(()=>{ if(window._fsReady) loadData(); },2500);
</script>
