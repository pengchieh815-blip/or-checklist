<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開刀房盤點系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        .result { margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <h2>開刀房財產盤點</h2>
        <div id="reader"></div>
        <div class="result" id="result">請開啟相機進行掃描…</div>
    </div>

    <script>
        // 核心掃描邏輯優化
        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Code matched = ${decodedText}`, decodedResult);
            document.getElementById('result').innerHTML = `
                <div style="color:green; font-weight:bold;">✅ 掃描成功！</div>
                <p>財產資訊：${decodedText}</p>
            `;
            // 掃描成功後自動停止相機，避免持續過熱
            html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
            // 處理掃描失敗（通常是找不到 QR/條碼，不需要一直輸出 log）
        }

        // 初始化掃描器
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { fps: 10, qrbox: {width: 250, height: 250} },
            /* verbose= */ false
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
